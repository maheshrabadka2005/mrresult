<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Get ₹200 Instant</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
background:linear-gradient(-45deg,#020024,#090979,#000428,#1b2735,#000);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.star{
position:absolute;
width:2px;
height:2px;
background:#fff;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;}
}

.card{
width:340px;
padding:30px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border-radius:20px;
text-align:center;
color:#fff;
box-shadow:0 0 30px rgba(0,255,255,.4);
animation:float 3s ease-in-out infinite;
z-index:10;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

h1{
font-size:32px;
margin-bottom:15px;
}

button{
width:100%;
padding:16px;
font-size:22px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
background:linear-gradient(90deg,#00e5ff,#00c853);
color:#fff;
box-shadow:0 0 20px cyan;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

#msg{
margin-top:20px;
font-size:24px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
<h1>🎁 Get ₹200 Instant</h1>

<button onclick="playPrank()">💸 Claim Now</button>

<div id="msg"></div>

<audio id="audio" src="audio.mp3" preload="auto"></audio>

</div>

<script>
for(let i=0;i<100;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDuration=(Math.random()*3+1)+"s";
document.body.appendChild(s);
}

function playPrank(){
const audio=document.getElementById("audio");
audio.currentTime=0;

audio.play().then(()=>{
document.getElementById("msg").innerHTML="😂 Surprise!";
}).catch((e)=>{
alert("Audio load nahi hui. Check karo ki audio.mp3 upload hui hai.");
console.log(e);
});

if(navigator.vibrate){
navigator.vibrate([300,100,300]);
}
}
</script>

</body>
</html>
