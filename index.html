<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRRESULT</title>

<style>

body { margin:0; background:#fff; font-family:Arial, sans-serif; }

/* HEADER */

.header{
background:#a41f3a;
color:#fff;
padding:18px 0;
text-align:center;
position:relative;
font-weight:bold;
}

.top-left{
position:absolute;
left:20px;
top:12px;
display:flex;
align-items:center;
font-size:18px;
color:#fff;
}

.logo-circle{
width:48px;
height:48px;
border-radius:50%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
border:2px solid white;
margin-right:8px;
}

.logo-circle img{
width:90%;
height:90%;
object-fit:contain;
}

.logo-text{
font-weight:bold;
font-size:10px;
letter-spacing:1px;
}

/* NAVBAR */

nav{
background:#780622;
display:flex;
justify-content:center;
flex-wrap:wrap;
}

nav a{
color:#fff;
text-decoration:none;
padding:10px 15px;
font-size:16px;
}

nav a:hover{
background:#9b0830;
}

/* COLOR BOXES */

.info-blocks{
margin:25px auto 0;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
max-width:800px;
padding:0 10px;
}

.info-block{
border-radius:15px;
height:80px;
box-shadow:0 1px 7px rgba(0,0,0,.11);
transition:transform .11s;
}

.info1{background:#e950cb;}
.info2{background:#484ff9;}
.info3{background:#b2000e;}
.info4{background:#ef7c12;}
.info5{background:#b56700;}
.info6{background:#22b900;}

.info-block:hover{
transform:scale(1.05);
}

/* SECTIONS */

.sections{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:18px;
max-width:1100px;
margin:40px auto;
padding:0 10px;
}

.section{
flex:1 1 240px;
background:#f2f2f2;
border-radius:10px;
padding:15px;
box-shadow:0 2px 7px rgba(0,0,0,0.08);
min-height:120px;
}

.section-title{
background:#b9003a;
color:#fff;
padding:10px;
border-radius:6px;
text-align:center;
margin-bottom:10px;
}

/* FEEDBACK FORM */

.feedback-box{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#fff;
padding:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.3);
border-radius:10px;
width:260px;
}

.feedback-box textarea{
width:100%;
height:80px;
margin-top:10px;
}

.feedback-box button{
margin-top:10px;
padding:6px 10px;
border:none;
background:#b9003a;
color:#fff;
border-radius:5px;
cursor:pointer;
}

/* MOBILE */

@media(max-width:600px){

.section{
flex:1 1 100%;
}

}

</style>
</head>

<body>

<div class="header">

<div class="top-left">

<div class="logo-circle">MAHESH</div>

</div>

<h2 style="margin:0;font-size:42px;">MRRESULT</h2>

<div style="font-size:14px;margin-top:6px;">www.mrresult.com</div>

</div>

<nav>

<a href="#">Home</a>
<a href="#">Syllabus</a>
<a href="#">Admit Card</a>
<a href="#">Result</a>
<a href="#">Job</a>
<a href="#">Contact</a>

</nav>

<div class="info-blocks">

<div class="info-block info1"></div>
<div class="info-block info2"></div>
<div class="info-block info3"></div>
<div class="info-block info4"></div>
<div class="info-block info5"></div>
<div class="info-block info6"></div>

</div>

<div class="sections">

<div class="section">
<div class="section-title">Results</div>
</div>

<div class="section">
<div class="section-title">Admit Card</div>
</div>

<div class="section">
<div class="section-title">Latest Jobs</div>
</div>

<div class="section">
<div class="section-title">Answer Key</div>
</div>

</div>

<footer style="background:#111;color:#ccc;text-align:center;padding:25px 10px;font-size:14px;">

<p>© 2025 Mahesh Rabarka | Email:
<a href="mailto:maheshrabarka2005@gmail.com" style="color:#ff3366;text-decoration:none;font-weight:bold;">
maheshrabarka2005@gmail.com
</a>
</p>

<button onclick="openFeedback()" style="background:#b9003a;color:#fff;border:none;padding:8px 14px;border-radius:6px;">
💬 Give Feedback
</button>

</footer>

<div id="feedbackForm" class="feedback-box">

<h3>Feedback</h3>

<textarea placeholder="Write your feedback"></textarea>

<button onclick="closeFeedback()">Close</button>

</div>

<script>

function openFeedback(){
document.getElementById("feedbackForm").style.display="block";
}

function closeFeedback(){
document.getElementById("feedbackForm").style.display="none";
}

</script>

</body>
</html>
