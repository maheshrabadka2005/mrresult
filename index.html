<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Get ₹200 Instant</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
background:linear-gradient(-45deg,#020024,#090979,#000428,#1b2735,#000);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

/* SHARE BUTTON */
.share-btn{
position:fixed;
top:15px;
right:15px;
padding:10px 15px;
border:none;
border-radius:25px;
background:linear-gradient(90deg,#ff512f,#dd2476);
color:#fff;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px rgba(255,0,100,0.6);
z-index:999;
transition:0.3s;
}

.share-btn:hover{
transform:scale(1.1);
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.star{
position:absolute;
width:2px;
height:2px;
background:#fff;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2;}
to{opacity:1;}
}

.card{
width:350px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
box-shadow:0 0 30px rgba(0,255,255,.4);
text-align:center;
color:#fff;
animation:float 3s ease-in-out infinite;
z-index:10;
position:relative;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

h1{font-size:32px;margin-bottom:15px;}
p{color:#ddd;margin-bottom:20px;}

button{
width:100%;
padding:16px;
font-size:22px;
font-weight:bold;
border:none;
border-radius:12px;
cursor:pointer;
background:linear-gradient(90deg,#00e5ff,#00c853);
color:#fff;
box-shadow:0 0 20px cyan;
transition:.3s;
}

button:hover{transform:scale(1.05);}

#msg{
margin-top:20px;
font-size:24px;
font-weight:bold;
color:#ffeb3b;
}

/* coin */
.coin{
position:absolute;
font-size:24px;
animation:flyUp 1s ease-out forwards;
pointer-events:none;
}

@keyframes flyUp{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(-200px) scale(0.5);opacity:0;}
}
</style>
</head>

<body>

<!-- SHARE BUTTON -->
<button class="share-btn" onclick="sharePage()">📤 Share</button>

<div class="card">
<h1>🎁 Get ₹200 Instant</h1>
<p>Click the button below to claim your reward!</p>

<button onclick="playPrank(event)">💸 Claim Now</button>

<div id="msg"></div>

<audio id="audio" src="audio.mp3" preload="auto"></audio>
</div>

<script>

// stars
for(let i=0;i<100;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDuration=(Math.random()*3+1)+"s";
document.body.appendChild(s);
}

// coins
function createCoins(x,y){
for(let i=0;i<20;i++){
let coin=document.createElement("div");
coin.className="coin";
coin.innerHTML="🪙";
coin.style.left=x+"px";
coin.style.top=y+"px";
document.body.appendChild(coin);

setTimeout(()=>coin.remove(),1000);
}
}

function playPrank(event){

const audio=document.getElementById("audio");
const msg=document.getElementById("msg");

createCoins(event.clientX, event.clientY);

audio.currentTime=0;
audio.play().catch(()=>{});

msg.innerHTML = `
<div style="font-size:80px;">🪙🪙🪙</div>
<div style="font-size:26px;color:#ff4444;font-weight:bold;">
Gotcha! 😂
</div>
`;

if(navigator.vibrate){
navigator.vibrate([300,100,300]);
}
}

// SHARE FUNCTION
function sharePage(){
const url = window.location.href;

if(navigator.share){
navigator.share({
title: "🎁 Get ₹200 Instant",
text: "Click and claim reward now!",
url: url
});
}else{
navigator.clipboard.writeText(url);
alert("Link copied!");
}
}

</script>

</body>
</html>
